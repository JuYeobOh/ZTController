# Controller가 매일 plan 생성 시 직원에게 무작위로 발행하는 work task 정의.
# Agent의 sites/groupoffice.py · sites/dms.py 의 _ACTION_TEMPLATES와 동일한
# 모듈/액션을 모두 발행한다 (Agent 기준 SSOT).

tasks:
  # ── Attendance (clock_in / clock_out 전용) ────────────────────────────────
  - task_id: attendance-clock-in
    site: groupoffice
    module: common
    action: login
    active: true

  - task_id: attendance-clock-out
    site: groupoffice
    module: common
    action: logout
    active: true

