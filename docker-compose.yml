services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zt-controller
    ports:
      - "8443:8443"
    # 모든 환경변수는 .env에서 (운영 다이얼 포함). 컨테이너 시작 시 자동 주입.
    env_file:
      - .env
    volumes:
      # DB 영속화
      - ./data:/app/data
      # seed YAML을 외부에서 마운트하면 재시작 없이 수정 가능
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
