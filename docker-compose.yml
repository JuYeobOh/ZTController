version: "3.9"

services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zt-controller
    ports:
      - "8443:8443"
    environment:
      # .env 파일로 오버라이드 가능
      CONTROLLER_DB_URL: sqlite:///./data/controller.db
      CONTROLLER_TIMEZONE: Asia/Seoul
      DAILY_PLAN_GENERATION_HOUR: "6"
      TASK_SEED_FILE: ./config/tasks.yaml
      EMPLOYEE_SEED_FILE: ./config/employees.yaml
      LOCATION_SEED_FILE: ./config/locations.yaml
    volumes:
      # DB 파일 영속화
      - ./data:/app/data
      # seed YAML을 외부에서 마운트하면 재시작 없이 수정 가능
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

